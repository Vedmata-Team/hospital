<!DOCTYPE html>
<html>
  <head><title>Netlify Forms</title></head>
  <body>
    <!-- Netlify form detection -->
    <form name="medicare-leads" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="mobile" />
      <input type="text" name="clinic" />
      <input type="text" name="role" />
    </form>
  </body>
</html>
